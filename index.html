<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- PWA & Android -->
    <meta name="theme-color" content="#facc15" />
    <meta name="background-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Colados" />
    <meta name="application-name" content="Colados" />
    <meta name="msapplication-TileColor" content="#09090b" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- SEO -->
    <title>Colados — Gestión Cafetera</title>
    <meta name="description" content="Sistema ERP/CRM offline para Colados Café. Gestión de ventas, compras, inventario y balance. 100% offline-first." />
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    
    <!-- Splash screens Apple -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
      /* Evitar flash blanco y scroll nativo en PWA */
      html, body, #root {
        background-color: #09090b;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      /* Safe area para notch de Android */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
